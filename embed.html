<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxly2 Embed</title>

  <link rel="icon" href="/fallen-leaf_1f342.ico" />
  <link rel="stylesheet" href="/main.css" />
  <link rel="stylesheet" href="/memdia.css" />
  <link rel="stylesheet" href="/embed.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" />
</head>

<body class="embed">
  <main>
    <!-- LEFT SIDE -->
    <div id="left-side" class="tab">
      <div id="editor-container">
        <div class="editor-wrapper">
          <div class="editor" id="editor"></div>
        </div>
      </div>

      <!-- RESIZE BAR -->
      <div id="resize-bar-X" class="resize-bar"></div>
    </div>

    <!-- RIGHT SIDE -->
    <div id="right-side" class="tab">
      <ul class="nav-bar tools">
        <li>
          <button id="run-button" title="Run">
            <span class="material-symbols-rounded">play_arrow</span>
          </button>
        </li>

        <li>
          <button id="debug-button" title="Debug">
            <span class="material-symbols-rounded">pest_control</span>
          </button>
        </li>

        <li class="hide">
          <button id="step-button" title="Step">
            <span class="material-symbols-rounded">step</span>
          </button>
        </li>

        <li class="hide">
          <button id="exit-button" title="Exit">
            <span class="material-symbols-rounded">stop</span>
          </button>
        </li>

        <li style="flex: 1"></li>

        <li>
          <button id="reset-button" title="Reset">
            <span class="material-symbols-rounded">restart_alt</span>
          </button>
        </li>

        <li>
          <button id="open-button" title="Open full">
            <span class="material-symbols-rounded">open_in_new</span>
          </button>
        </li>

        <li class="hide"><button id="share-button">Share</button></li>
        <li class="hide"><button id="info-button">Info</button></li>
      </ul>

      <div id="output-panel" class="panel">
        <p id="stdout"></p>
        <p id="stderr"></p>
      </div>

      <!-- TOP RESIZE BAR (tooltip removed) -->
      <div id="output-vars-resize-bar" class="drawer-resize-bar"></div>

      <!-- bottom drawer -->
      <section id="bottom-drawer" class="drawer-stack">

        <div class="drawer-section" data-drawer="vars">
          <button class="drawer-header" type="button">
            <span class="drawer-title">Variables</span>
            <span class="drawer-chevron material-symbols-rounded">expand_more</span>
          </button>

          <div class="drawer-body" id="vars-body">
            <div id="vars-panel" class="panel">
              <div id="Variable-table-container" class="panel">
                <table id="Variable-table-outer">
                  <thead>
                    <tr>
                      <th>Variable</th>
                      <th>Type</th>
                      <th>Value</th>
                      <th>Scope</th>
                    </tr>
                  </thead>
                  <tbody id="Variable-table"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- MIDDLE RESIZE BAR (tooltip removed) -->
        <div id="drawer-resize-bar" class="drawer-resize-bar"></div>

        <div class="drawer-section" data-drawer="memdia">
          <button class="drawer-header" type="button">
            <span class="drawer-title">Memdia</span>
            <span class="drawer-chevron material-symbols-rounded">expand_more</span>
          </button>

          <div class="drawer-body" id="memdia-body">
            <div id="memdia-panel" class="panel"></div>
          </div>
        </div>

      </section>
    </div>
  </main>

  <div id="reset-confirm">
    <div class="modal-content">
      <p>Reset code and clear output?</p>
      <div class="modal-buttons">
        <button id="confirm-reset">Reset</button>
        <button id="cancel-reset" class="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div id="info-modal">
    <div class="info-modal-content">
      <p>Info</p>
      <button id="close-info" class="close-button">Close</button>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
  <script data-goatcounter="https://praxly.goatcounter.com/count"
          data-goatcounter-settings='{"allow_frame": true}'
          async src="//gc.zgo.at/count.js"></script>

  <!-- Drawer and resize behavior -->
  <script>
    (function () {
      const bottomDrawer = document.getElementById("bottom-drawer");
      const resizer = document.getElementById("drawer-resize-bar");
      const outputVarsResizer = document.getElementById("output-vars-resize-bar");

      const varsSection = document.querySelector('.drawer-section[data-drawer="vars"]');
      const memSection = document.querySelector('.drawer-section[data-drawer="memdia"]');

      const varsBody = document.getElementById("vars-body");
      const memBody = document.getElementById("memdia-body");

      if (!bottomDrawer || !resizer || !outputVarsResizer || !varsSection || !memSection || !varsBody || !memBody) return;

      const MIN_BODY = 140;
      const DEFAULT_BODY = 220;

      function isOpen(section) {
        return section.classList.contains("is-open");
      }

      function snapDrawerStackToContent() {
        const varsHeader = varsSection.querySelector(".drawer-header");
        const memHeader = memSection.querySelector(".drawer-header");

        const hVarsHeader = varsHeader ? varsHeader.getBoundingClientRect().height : 0;
        const hMemHeader = memHeader ? memHeader.getBoundingClientRect().height : 0;
        const hBarBetween = resizer.getBoundingClientRect().height || 6;

        const varsOpen = isOpen(varsSection);
        const memOpen = isOpen(memSection);

        if (!varsOpen && !memOpen) {
          bottomDrawer.style.height = "";
          return;
        }

        const hVarsBody = varsOpen ? Math.max(MIN_BODY, varsBody.getBoundingClientRect().height) : 0;
        const hMemBody = memOpen ? Math.max(MIN_BODY, memBody.getBoundingClientRect().height) : 0;

        bottomDrawer.style.height =
          hVarsHeader + hMemHeader + hBarBetween + hVarsBody + hMemBody + "px";
      }

      bottomDrawer.addEventListener("click", (e) => {
        const header = e.target.closest(".drawer-header");
        if (!header) return;

        const section = header.closest(".drawer-section");
        const body = section.querySelector(".drawer-body");

        if (section.classList.contains("is-open")) {
          section.classList.remove("is-open");
          body.style.height = "";
        } else {
          section.classList.add("is-open");
          body.style.height = DEFAULT_BODY + "px";
        }

        requestAnimationFrame(snapDrawerStackToContent);
      });

      let dragging = false;
      let startY = 0;
      let startVars = 0;
      let startMem = 0;

      resizer.addEventListener("mousedown", (e) => {
        if (!isOpen(varsSection) || !isOpen(memSection)) return;

        dragging = true;
        startY = e.clientY;
        startVars = varsBody.getBoundingClientRect().height;
        startMem = memBody.getBoundingClientRect().height;

        document.body.style.cursor = "row-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!dragging) return;

        const dy = e.clientY - startY;
        const newVars = startVars + dy;
        const newMem = startMem - dy;

        if (newVars < MIN_BODY || newMem < MIN_BODY) return;

        varsBody.style.height = newVars + "px";
        memBody.style.height = newMem + "px";
        snapDrawerStackToContent();
      });

      document.addEventListener("mouseup", () => {
        dragging = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });

      let draggingTop = false;
      let startYTop = 0;
      let startDrawerH = 0;
      let startVarsH = 0;

      outputVarsResizer.addEventListener("mousedown", (e) => {
        if (!isOpen(varsSection)) return;

        draggingTop = true;
        startYTop = e.clientY;
        startDrawerH = bottomDrawer.getBoundingClientRect().height;
        startVarsH = varsBody.getBoundingClientRect().height;

        document.body.style.cursor = "row-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        if (!draggingTop) return;

        const dy = e.clientY - startYTop;
        const newDrawerH = startDrawerH - dy;
        const newVarsH = startVarsH - dy;

        if (newVarsH < MIN_BODY) return;

        bottomDrawer.style.height = newDrawerH + "px";
        varsBody.style.height = newVarsH + "px";
      });

      document.addEventListener("mouseup", () => {
        draggingTop = false;
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });

    })();
  </script>
</body>
</html>
