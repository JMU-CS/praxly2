<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praxly2</title>
  <link rel="icon" href="/fallen-leaf_1f342.ico" type="image/x-icon">
  <link rel="stylesheet" href="/main.css">
  <link rel="stylesheet" href="/memdia.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>

<body>
<header>
    <h1>Praxly 🍂</h1>
    <div id="notification">Link copied to clipboard!</div>
    <div class="toolbar">
        <ul class="tools">
          <li>
            <button id="run-button" title="Run the entire program">
              <span class="material-symbols-rounded">play_arrow</span>
            </button>
          </li>
          <li>
            <button id="debug-button" title="Debug one step at a time">
              <span class="material-symbols-rounded">pest_control</span>
            </button>
          </li>
          <li class="hide">
            <button id="step-button" title="Run the next step">
              <span class="material-symbols-rounded">step</span>
            </button>
          </li>
          <li class="hide">
            <button id="exit-button" title="Exit the debugger">
              <span class="material-symbols-rounded">stop</span>
            </button>
          </li>
          <li>
            <button id="share-button" title="Create link for sharing">
              <span class="material-symbols-rounded share">share</span>
            </button>
          </li>
          <li>
            <button id="info-button" title="Information and examples">
              <span class="material-symbols-rounded">info</span>
            </button>
          </li>
          <li>
            <button id="reset-button" title="Reset to the initial code">
              <span class="material-symbols-rounded">restart_alt</span>
            </button>
          </li>
        </ul>
    </div>
</header>
<main></main>
<div class="label">Output</div>
<footer id="output-panel">
  <p id="stdout"></p>
  <p id="stderr"></p>
</footer>


  <!-- notification for Share button -->
  <div id="toast">
    Link copied to clipboard!
  </div>

  <!-- modal for info button -->
  <div id="info-modal">
    <div class="info-modal-content">
      <h1>Praxly 🍂</h1>
      <ul>
        <li><button class="example-option">Variables</button></li>
        <li><button class="example-option">Hello World</button></li>
        <li><button class="example-option">Fibonacci</button></li>
      </ul>
      <button id="close-info" class="close-button">Close</button>
    </div>
  </div>

  <!-- modal for reset button -->
  <div id="reset-confirm">
    <div class="reset-modal">
      <p>Are you sure you want to reset?</p>
      <div class="modal-buttons">
        <button id="confirm-reset">Yes</button>
        <button id="cancel-reset" class="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
  <script type="module" src="/src/resize.ts"></script>
  <script data-goatcounter="https://praxly.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>

</html>
