<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxly2 Main</title>
  <link rel="icon" href="/fallen-leaf_1f342.ico" type="image/x-icon">
  <link rel="stylesheet" href="/main.css">
  <link rel="stylesheet" href="/memdia.css" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
  <header class="nav-bar">
    <div id="title-version">
      <h1 id="titleRefresh">Praxly 🍂</h1>
      <!-- <div id="examples-trigger-container">
        <button id="examples-button" class="MainMenu-button" title="Example Programs">
          <span class="material-symbols-rounded">menu_book</span>
        </button>
      </div> -->
    </div>

    <!-- Toolbar buttons -->
    <ul>
      <li>
        <button id="run-button" class="MainMenu-button" title="Run the entire program">
          Run <span class="material-symbols-rounded run">play_arrow</span>
        </button>
      </li>
      <li>
        <button id="debug-button" class="MainMenu-button" title="Run one step at a time">
          Debug <span class="material-symbols-rounded bug">pest_control</span>
        </button>
      </li>
      <li>
        <button id="step-button" class="MainMenu-button debugOptions" title="Run the next step" style="display: none;">
          Step <span class="material-symbols-rounded step">step</span>
        </button>
      </li>
      <li>
        <button id="exit-button" class="MainMenu-button debugOptions" title="Exit the debugger" style="display: none;">
          Exit <span class="material-symbols-rounded stop">stop</span>
        </button>
      </li>
      <li>
        <li>
        <button id="examples-button" class="MainMenu-button" title="Example Programs">
          Examples<span class="material-symbols-rounded">menu_book</span>
        </button>
      </li>
        <button id="share-button" class="MainMenu-button" title="Create link for sharing">
          Share <span class="material-symbols-rounded share">share</span>
        </button>
      </li>
      <li id="settings-dropdown">
        <button id="settings-button" class="MainMenu-button" title="Settings">
          Settings <span class="material-symbols-rounded extra">settings</span>
          <!-- <span class="button-text">Settings</span> -->
        </button>
        <div class="dropdown-content">
          <button class="dropdown-item">Help</button>
          <button class="dropdown-item">Language</button>
          <button class="dropdown-item">Manual</button>
        </div>
      </li>
      <li>
        <button id="reset-button" class="MainMenu-button" title="Reset the initial code">
          Reset <span class="material-symbols-rounded reset">restart_alt</span>
        </button>
      </li>
    </ul>
  </header>

  <main>
    <div id="left-side">
      <div class="left-toolbar">
        <div id="language-dropdown">
          <button id="language-button">Language ▼</button>
          <div id="language-menu">
            <button>Praxis</button>
            <button>Java</button>
            <button>CSP</button>
            <button>Python</button>
          </div>
        </div>
        <button id="new-editor" class="left-toolbar" title="Add a new editor"> + </button>
      </div>
      <div id="editor" class="panel"></div>
    </div>
    <div id="resize-bar-X"></div>
    <div id="right-side">
      <div id="output-panel" class="panel"></div>
      <div id="resize-bar-Y"></div>
      <div id="memdia-panel" class="panel"></div>
    </div>
  </main>

  <!-- notification for Share button -->
  <div id="toast"
    style="display: none; position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 10px; border-radius: 5px;">
    Link copied to clipboard!
  </div>

  <!-- notification for reset button -->
  <div id="reset-confirm">
    <div class="reset-modal">
      <p>Are you sure you want to reset?</p>
      <div class="modal-buttons">
        <button id="confirm-reset">Yes</button>
        <button id="cancel-reset" class="cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div id="examples-modal">
  <div class="examples-modal-content">
    <h2>Example Programs</h2>
    <ul>
      <li><button class="example-option">Variables</button></li>
      <li><button class="example-option">Hello World</button></li>
      <li><button class="example-option">Fibonacci</button></li>
    </ul>
    <button id="close-examples" class="close-button">Close</button>
  </div>
</div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
