<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxly</title>
    <link rel="stylesheet" href="tempmain.css">
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>

<header>
    <h1>Praxly 🍂</h1>
    <div style="display: none;" class="notification"></div>
    <div class="toolbar">
        <ul class="tools">
            <li><button id="run-button">
                <span class="material-symbols-rounded">play_arrow</span>
            </button></li>
            <li><button id="debug-button">
                 <span class="material-symbols-rounded">pest_control</span>
            </button></li>
            <li><button id="share-button">
                <span class="material-symbols-rounded share">share</span>
            </button></li>
            <li><button id="info-button">
                <span class="material-symbols-rounded">info</span>
            </button></li>
            <li><button id="reset-button">
                <span class="material-symbols-rounded">restart_alt</span>
            </button></li>
        </ul>
    </div>
</header>
<main>
    <div class="tab">
        <div class="tab-content">
            <div class="tab-header">
                <select name="" id="" class="langauge-dropdown">
                    <option value="Praxis">Praxis</option>
                    <option value="Python">Python</option>
                </select>
                <button class="add">+</button>
            </div>
            <div class="editor">code goes here.</div>
            <div class="memdia">
                <div class="label">Diagram/Memory</div>
                <div class="diagram">diagram</div>
            </div>
        </div>
        <div class="resize-bar"></div>
    </div>
</main>
<footer>
     <div class="label">Output</div>
</footer>

</body>
</html>
