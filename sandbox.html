<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praxly2 Sandbox</title>
    <link rel="stylesheet" href="/sandbox.css" />
    <link rel="stylesheet" href="/memdia.css" />
  </head>
  <body>
    <div id="controls">
      <label for="src-lang">Source:</label>
      <select id="src-lang">
        <option selected>Praxis</option>
        <option>Python</option>
      </select>
      <label for="dst-lang">Target:</label>
      <select id="dst-lang">
        <option>CSP</option>
        <option>English</option>
        <option>Java</option>
        <option>Praxis</option>
        <option selected>Python</option>
      </select>
      <button id="run-button">run</button>
      <button id="debug-button">debug</button>
      <button id="step-button">step</button>
      <label for="examples">Example Programs:</label>
      <select id="example-drop"></select>
      <input type="text" id="input-field">
    </div>
    <div id="panels">
      <!-- <textarea id="editor"></textarea> -->
      <div id="editor"></div>
      <div class="divider"></div>
      <div id="editor2"></div>
      <div id="tree-panel"></div>
       <div id="source-panel"></div>
      <div id="output-panel"></div>
      <div id="memdia-panel"></div>
    </div>
    <script type="module" src="/src/sandbox.ts"></script>
  </body>
</html>
